name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run ci:build
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-dist
          path: |
            dist
            dist-electron

